<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        //Маєте масив чисел. Використовуйте вже існуючі методи масиву для 
        //створення нового масиву, в якому лише парні числа з оригінального масиву.

        let x = [1, 2, 3, 4, 5, 6, 7, 8, 9]
        let newX = []
        for (let y of x){
            if (y % 2 == 0){
                newX.push(y)
            }        
        }
        console.log(newX)
    </script>
</body>
