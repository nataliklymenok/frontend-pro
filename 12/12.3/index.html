<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>ToDo List</h1>
    <ul id="myList">
        <li>Task 1 <button>Delete</button></li>
        <li>Task 2 <button>Delete</button></li>
        <li>Task 3 <button>Delete</button></li>


    </ul>
    <input id="fld" type="text" placeholder="Enter the task"> 
    <button id="addBtn">Add the task</button>
    <script>
        const ulId = document.querySelector('#myList')

        ulId.addEventListener("click", function (event) {
            if (event.target.tagName === "BUTTON") {
                event.target.closest('LI').remove()
            }
        });

        const textFld = document.querySelector("#fld")
        const addBtn = document.querySelector("#addBtn")

        function handleClick(event){
            const newLi = document.createElement('li')
            const newBtn = document.createElement('button')
            
            newBtn.textContent = 'Delete'
            newLi.textContent = textFld.value
            
            ulId.appendChild(newLi)
            newLi.append(' ', newBtn)
            textFld.value = ''
        }

        addBtn.addEventListener("click", handleClick)

    </script>
</body>
</html>
