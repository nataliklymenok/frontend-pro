<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="btns">
        <button id="first">Button 1</button>
        <button id="second">Button 2</button>
        <button id="third">Button 3</button>
    </div>
    <script>

    const allBtns = document.querySelector('#btns')

    allBtns.addEventListener('click', handleBtnClick)

    function handleBtnClick(event){
        const clickedBtn = event.target.textContent
        alert(`${clickedBtn} clicked`)
    }

    </script>
</body>
</html>
