<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        //Вивести в консоль числа від 20 до 30 через пропуск використовуючи крок 0,5 (20 20,5 21 21,5 ....)
        let result = ''
        for(let i = 20; i<=30; i+=0.5){
            result +=i + ' '
        }
        console.log(result)
    </script>
</body>
