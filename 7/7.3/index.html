<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <script>
        //Реалізуйте функцію removeElement(array, item), щоб видалити елемент item з масиву array.

        const arr = [1, 3, 4, 6, 2, 5, 7];

        const removeElement = function(array, item){
            let newArr = []

            for (let i = 0; i < array.length; i++){        
                if (array[i] !== item){

                    newArr.push(array[i])
                } 
            }
            return newArr        
        }

        console.log(removeElement(arr, 2))
        console.log(removeElement(arr, 1))
 
    </script>
</body>
