<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <span>Таймер відліку</span>
  </head>
  <body>
    <script>
      //Реалізувати таймер відліку:

      //Початок таймера визначати із змінної
      //Відобразити на сторінці час у форматі 01:25
      //Коли закінчився таймер зупинити його

      let ms = 60000;
      const timer = document.createElement("span");
      document.body.append(timer);

      const intervalId = setInterval(startTimer, 1000);

      function startTimer() {
        let minutes = Math.floor(ms / 60000);
        let seconds = (ms % 60000) / 1000;
        console.log(seconds);
        timer.textContent = `${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;

        if (ms === 0) {
          clearInterval(intervalId);
          return;
        }
        ms -= 1000;
      }
    </script>
  </body>
</html>
