<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Створіть клас Calculator, який буде мати методи для виконання базових математичних операцій: додавання, віднімання, множення та ділення.

      class Calculator {
        add(a, b) {
          return a + b;
        }
        subtract(a, b) {
          return a - b;
        }
        multiply(a, b) {
          return a * b;
        }
        divide(a, b) {
          return b === 0 ? "На 0 ділити не можна" : a / b;
        }
      }

      const calc = new Calculator();

      console.log(calc.add(5, 3)); // 8

      console.log(calc.subtract(10, 4)); // 6

      console.log(calc.multiply(3, 6)); // 18

      console.log(calc.divide(8, 2)); // 4
      console.log(calc.divide(8, 0)); // На 0 ділити не можна
    </script>
  </body>
</html>
