<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Створіть клас BankAccount, який буде представляти банківський рахунок. Додайте властивість балансу та методи
      // для внесення та зняття грошей.

      class BankAccount {
        constructor(balance) {
          this.balance = balance;
        }

        getBalance() {
          return this.balance;
        }

        deposit(cash) {
          this.balance += cash;
        }
        withdraw(cash) {
          this.balance -= cash;
        }
      }

      const account1 = new BankAccount(1000);

      console.log(account1.getBalance()); // 1000

      account1.deposit(500);

      console.log(account1.getBalance()); // 1500

      account1.withdraw(200);

      console.log(account1.getBalance()); // 1300
    </script>
  </body>
</html>
